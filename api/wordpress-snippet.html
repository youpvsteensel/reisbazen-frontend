<!-- Routebaas Itinerary Planner — plak dit in een Custom HTML blok in WordPress -->
<!-- Vervang API_URL door de URL van je gedeployde API (bijv. https://jouw-app.railway.app) -->

<style>
  .rb-planner {
    font-family: inherit;
    max-width: 680px;
    margin: 2rem auto;
  }
  .rb-planner h3 {
    margin-bottom: 1rem;
  }
  .rb-form {
    display: grid;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .rb-form label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.25rem;
    font-size: 0.9rem;
  }
  .rb-form input,
  .rb-form textarea,
  .rb-form select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.95rem;
    box-sizing: border-box;
  }
  .rb-form textarea {
    resize: vertical;
    min-height: 70px;
  }
  .rb-interesses {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .rb-interesses label {
    font-weight: normal;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    background: #f4f4f4;
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .rb-interesses input[type="checkbox"] {
    width: auto;
    margin: 0;
  }
  .rb-btn {
    background: #1a5c38;
    color: white;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .rb-btn:hover { background: #144a2d; }
  .rb-btn:disabled { background: #999; cursor: not-allowed; }
  .rb-output {
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 1.5rem;
    white-space: pre-wrap;
    line-height: 1.7;
    font-size: 0.95rem;
    min-height: 100px;
    display: none;
  }
  .rb-error {
    color: #c0392b;
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }
</style>

<div class="rb-planner">
  <h3>Plan jouw reisroute</h3>
  <div class="rb-form">

    <div>
      <label for="rb-bestemming">Bestemming</label>
      <input type="text" id="rb-bestemming" placeholder="bijv. Patagonië, IJsland, Vietnam..." />
    </div>

    <div>
      <label for="rb-dagen">Aantal dagen</label>
      <input type="number" id="rb-dagen" min="3" max="90" value="14" />
    </div>

    <div>
      <label>Interesses</label>
      <div class="rb-interesses">
        <label><input type="checkbox" value="hiken & wandelen"> hiken & wandelen</label>
        <label><input type="checkbox" value="natuur"> natuur</label>
        <label><input type="checkbox" value="wildlife"> wildlife</label>
        <label><input type="checkbox" value="avontuur"> avontuur</label>
        <label><input type="checkbox" value="roadtrip"> roadtrip</label>
        <label><input type="checkbox" value="kamperen"> kamperen</label>
        <label><input type="checkbox" value="nationale_parken"> nationale parken</label>
        <label><input type="checkbox" value="fotografie"> fotografie</label>
        <label><input type="checkbox" value="watersport"> watersport</label>
        <label><input type="checkbox" value="cultuur"> cultuur</label>
        <label><input type="checkbox" value="gastronomie"> gastronomie</label>
        <label><input type="checkbox" value="off_the_beaten"> off the beaten</label>
      </div>
    </div>

    <div>
      <label for="rb-extra">Extra wensen <span style="font-weight:normal">(optioneel)</span></label>
      <textarea id="rb-extra" placeholder="bijv. camper, budget, reizend met kinderen..."></textarea>
    </div>

    <div>
      <button class="rb-btn" id="rb-submit" onclick="rbGenereer()">Genereer reisroute</button>
      <div class="rb-error" id="rb-error"></div>
    </div>
  </div>

  <div class="rb-output" id="rb-output"></div>
</div>

<script>
const API_URL = "https://JOUW-APP.railway.app"; // ← vervang dit

async function rbGenereer() {
  const bestemming = document.getElementById("rb-bestemming").value.trim();
  const dagen = parseInt(document.getElementById("rb-dagen").value);
  const extra = document.getElementById("rb-extra").value.trim();
  const interesses = Array.from(
    document.querySelectorAll(".rb-interesses input:checked")
  ).map(cb => cb.value);

  const fout = document.getElementById("rb-error");
  fout.textContent = "";

  if (!bestemming) { fout.textContent = "Vul een bestemming in."; return; }
  if (interesses.length === 0) { fout.textContent = "Kies minimaal één interesse."; return; }

  const btn = document.getElementById("rb-submit");
  const output = document.getElementById("rb-output");
  btn.disabled = true;
  btn.textContent = "Bezig met genereren...";
  output.style.display = "block";
  output.textContent = "";

  try {
    const resp = await fetch(`${API_URL}/itinerary`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ bestemming, dagen, interesses, extra_wensen: extra || null }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || "Onbekende fout");
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6);
        if (data === "[DONE]") break;
        try {
          const { text } = JSON.parse(data);
          output.textContent += text;
        } catch {}
      }
    }
  } catch (e) {
    fout.textContent = "Er is iets misgegaan: " + e.message;
    output.style.display = "none";
  } finally {
    btn.disabled = false;
    btn.textContent = "Genereer reisroute";
  }
}
</script>
